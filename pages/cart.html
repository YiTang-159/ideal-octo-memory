<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Morico</title>
    
    <link rel="stylesheet" href="../assets/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/user/common.css">
    <link rel="stylesheet" href="../assets/css/user/header.css">
    <link rel="stylesheet" href="../assets/css/user/cart.css">
    <link rel="stylesheet" href="../assets/vendor/fontawesome-free-7.2.0/css/all.min.css">
    <script src="../assets/js/user/auth-guard.js"></script>
</head>

<body>
    <header>
        <div class="header-container">
            <a href="../index.html" class="logo">
                <img src="../assets/image/common/morico-black-emblem.png" alt="MORICO" class="logo-img">
                <span>MORICO</span>
            </a>
            <div class="search-bar">
                <input type="text" placeholder="Bạn muốn tìm bánh gì...">
                <button>
                    <i class="fa-solid fa-magnifying-glass" style="color: white;"></i>
                </button>
            </div>
            <div class="search-results"></div>

            <div class="icon-group">
                <a href="cart.html" class="icon-link" id="cartLink">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartCountBadge" class="cart-count">0</span>
                </a>
                <div class="user-menu">
                    <i class="fa-solid fa-user user-icon" id="userIcon"></i>
                    <div class="dropdown" id="userDropdown"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="nav-bar">
        <a href="../index.html">TRANG CHỦ</a>
        <a href="about.html">GIỚI THIỆU</a>
        <a href="product.html">SẢN PHẨM</a>
    </nav>

    <h1 class="page-title">Giỏ hàng của bạn</h1>

    <div id="cart-container">
        <div class="select-all" id="select-all-container" style="display: none;">
            <div>
                <input type="checkbox" id="select-all" onchange="toggleSelectAll()">
                <label for="select-all">Chọn tất cả</label>
            </div>
            <button onclick="clearCart()" class="remove-btn">Xóa giỏ hàng</button>
        </div>

        <div class="cart-header">
            <div>Sản phẩm</div>
            <div>Đơn giá</div>
            <div>Số lượng</div>
            <div>Tổng tiền</div>
            <div>Thao tác</div>
        </div>

        <div id="cart-items-list">
            <div id="empty-cart-message" class="empty-cart" style="display: none;">
                <i class="fa-solid fa-cart-shopping"></i>
                <p>Giỏ hàng của bạn đang trống</p>
                <a href="product.html"
                    style="display: inline-block; margin-top: 15px; padding: 10px 20px; background-color: #8B0000; color: white; text-decoration: none; border-radius: 5px;">Tiếp
                    tục mua sắm</a>
            </div>
        </div>

        <!-- Tách riêng nút Lịch sử mua hàng khỏi summary-box -->
        <div class="history-link-container">
            <a href="history.html">Lịch sử mua hàng</a>
        </div>

        <div class="summary-box" id="summary-box">
            <span class="total-label">Tổng số tiền cần thanh toán:</span>
            <div class="checkout-group">
                <span class="total-amount" id="final-total">0₫</span>
                <button class="order-btn" onclick="handleCheckout()">Thanh toán</button>
            </div>
        </div>
    </div>

    <footer>
        © 2025 Morico Bakery | Hotline: 0909 123 456 | Email: contact@morico.vn
    </footer>

    <!-- JavaScript -->
    <script src="../assets/js/user/header.js"></script>
    <script src="../assets/js/user/cart.js"></script>
</body>

</html>
