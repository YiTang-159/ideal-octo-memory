<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="../assets/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/user/common.css">

    <style>
        body {
            align-items: center;
            justify-content: center;
        }

        .profile-card {
            background: #fff8c9;
            border: 2px solid var(--primary-color);
            border-radius: 1rem;
            box-shadow: var(--shadow);
        }

        .profile-card .form-control {
            border: 1.5px solid var(--primary-color);
            background-color: #FFFCEE;
            color: var(--primary-color);
            font-family: "Century", serif;
        }

        .profile-card .form-control:disabled {
            background-color: #fdf3b5;
            color: #6b0000;
        }

        .profile-card .form-control:focus {
            border-color: var(--primary-hover);
            background-color: #FFF8B5;
            box-shadow: 0 0 0 0.2rem rgba(139, 0, 0, 0.15);
        }

        .btn-morico {
            background: var(--primary-color);
            color: #FFFBD1;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .btn-morico:hover {
            background: var(--primary-hover);
            color: #FFFBD1;
            transform: scale(1.03);
        }
    </style>

</head>

<body>

    <div class="profile-card p-4 p-md-5 mx-auto" style="max-width: 520px; width: 100%;">
        <h2 class="text-center mb-4" style="color: var(--primary-color); font-size: 2rem;">Hồ sơ cá nhân</h2>

        <div class="mb-3">
            <label class="form-label fw-bold" style="color: var(--primary-color);">Họ</label>
            <input type="text" class="form-control" id="ho" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" style="color: var(--primary-color);">Tên</label>
            <input type="text" class="form-control" id="ten" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" style="color: var(--primary-color);">Email</label>
            <input type="email" class="form-control" id="email" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" style="color: var(--primary-color);">Số điện thoại</label>
            <input type="tel" class="form-control" id="phone" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" style="color: var(--primary-color);">Địa chỉ</label>
            <input type="text" class="form-control" id="address" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold" style="color: var(--primary-color);">Mật khẩu</label>
            <input type="password" class="form-control" id="password" disabled>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
            <button id="editBtn" class="btn btn-morico flex-fill py-2">Sửa thông tin</button>
            <button id="saveBtn" class="btn btn-morico flex-fill py-2" style="display:none;">Lưu thay đổi</button>
            <button id="homeBtn" class="btn btn-morico flex-fill py-2">Quay về</button>
        </div>
    </div>

    <script>
        // Lấy thông tin người dùng từ localStorage - sửa key thành 'currentUser'
        const user = JSON.parse(localStorage.getItem("currentUser"));

        if (!user) {
            alert("Bạn chưa đăng nhập!");
            window.location.href = "login.html";
        } else {
            // SỬA: Đặt giá trị từ dữ liệu đăng ký
            // Tách họ và tên từ fullname
            const fullnameParts = user.fullname ? user.fullname.split(' ') : [];
            const ho = fullnameParts.length > 0 ? fullnameParts[0] : "";
            const ten = fullnameParts.length > 1 ? fullnameParts.slice(1).join(' ') : "";

            document.getElementById("ho").value = ho || "";
            document.getElementById("ten").value = ten || "";
            document.getElementById("email").value = user.email || "";
            document.getElementById("phone").value = user.phone || "";
            document.getElementById("address").value = user.address || "";
            document.getElementById("password").value = user.password || "";
        }

        const editBtn = document.getElementById("editBtn");
        const saveBtn = document.getElementById("saveBtn");
        const homeBtn = document.getElementById("homeBtn");

        // Cho phép chỉnh sửa thông tin
        editBtn.addEventListener("click", () => {
            document.querySelectorAll("input:not(#ho):not(#ten)").forEach(i => i.disabled = false);
            editBtn.style.display = "none";
            saveBtn.style.display = "inline-block";
        });

        // Lưu thay đổi vào localStorage
        saveBtn.addEventListener("click", () => {
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value.trim();

            // Validate email
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alert("Email không hợp lệ!");
                return;
            }

            // Validate số điện thoại (10-11 số)
            if (phone && !/^\d{10,11}$/.test(phone)) {
                alert("Số điện thoại phải có 10-11 chữ số!");
                return;
            }

            // Validate mật khẩu (ít nhất 6 ký tự)
            if (password && password.length < 6) {
                alert("Mật khẩu phải có ít nhất 6 ký tự!");
                return;
            }

            // SỬA: Cập nhật đúng cấu trúc dữ liệu từ đăng ký
            const updatedUser = {
                ...user, // Giữ lại tất cả thông tin cũ
                fullname: document.getElementById("ho").value.trim() + " " + document.getElementById("ten").value.trim(),
                email: email,
                phone: phone,
                password: password,
                address: document.getElementById("address").value.trim()
            };

            // Sửa key thành 'currentUser' để khớp với trang chủ
            localStorage.setItem("currentUser", JSON.stringify(updatedUser));

            // SỬA: Cập nhật cả trong danh sách users
            let users = JSON.parse(localStorage.getItem("users")) || [];
            const userIndex = users.findIndex(u => u.username === user.username);
            if (userIndex !== -1) {
                users[userIndex] = {
                    ...users[userIndex],
                    fullname: updatedUser.fullname,
                    phone: updatedUser.phone,
                    password: updatedUser.password
                };
                localStorage.setItem("users", JSON.stringify(users));
            }

            alert("Cập nhật thông tin thành công!");
            location.reload();
        });

        // Chuyển về trang index
        homeBtn.addEventListener("click", () => {
            window.location.href = "../index.html"; // Đường dẫn tới trang chủ
        });
    </script>

</body>

</html>
