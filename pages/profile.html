<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>

    <link rel="stylesheet" href="../assets/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/user/common.css">
    <link rel="stylesheet" href="../assets/css/user/header.css">
    <link rel="stylesheet" href="../assets/css/user/auth.css">
    <link rel="stylesheet" href="../assets/css/user/profile.css">
    <link rel="stylesheet" href="../assets/vendor/fontawesome-free-7.2.0/css/all.min.css">
    <script src="../assets/js/user/auth-guard.js"></script>

</head>

<body>
    <header>
        <div class="header-container">
            <a href="../index.html" class="logo">
                <img src="../assets/image/common/morico-black-emblem.png" alt="MORICO" class="logo-img">
                <span>MORICO</span>
            </a>
            <div class="search-bar">
                <input type="text" placeholder="Bạn muốn tìm bánh gì...">
                <button>
                    <i class="fa-solid fa-magnifying-glass" style="color: white;"></i>
                </button>
            </div>
            <div class="icon-group">
                <a href="cart.html" class="icon-link" id="cartLink">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartCountBadge" class="cart-count">0</span>
                </a>
                <div class="user-menu">
                    <i class="fa-solid fa-user user-icon" id="userIcon"></i>
                    <div class="dropdown" id="userDropdown"></div>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-bar">
        <a href="../index.html">TRANG CHỦ</a>
        <a href="about.html">GIỚI THIỆU</a>
        <a href="products.html">SẢN PHẨM</a>
    </nav>
    
    <div class="profile-container">
        <div class="profile-card mx-auto">
            <h1 class="page-title text-center">Hồ sơ cá nhân</h1>

            <!-- Thông tin đăng nhập -->
            <div class="section-header">
                <div><i class="fa-solid fa-shield-halved"></i> Thông tin đăng nhập</div>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="username" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Mật khẩu</label>
                    <div>
                        <button id="showChangePwBtn" class="btn btn-morico-outline w-100" type="button" data-bs-toggle="collapse" data-bs-target="#changePwSection">
                            Đổi mật khẩu
                        </button>
                    </div>
                </div>
                <div class="col-12">
                    <div id="changePwSection" class="collapse mt-2 p-3 border rounded shadow-sm">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small">Mật khẩu hiện tại</label>
                                <div class="password-field-wrapper">
                                    <input type="password" id="currentPw" class="form-control" placeholder="Nhập MK cũ">
                                    <i class="fa-solid fa-eye eye-toggle" onclick="togglePwVisibility('currentPw')"></i>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Mật khẩu mới</label>
                                <div class="password-field-wrapper">
                                    <input type="password" id="newPw" class="form-control" placeholder="Nhập MK mới">
                                    <i class="fa-solid fa-eye eye-toggle" onclick="togglePwVisibility('newPw')"></i>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">Xác nhận mật khẩu mới</label>
                                <div class="password-field-wrapper">
                                    <input type="password" id="confirmNewPw" class="form-control" placeholder="Nhập lại MK mới">
                                    <i class="fa-solid fa-eye eye-toggle" onclick="togglePwVisibility('confirmNewPw')"></i>
                                </div>
                            </div>
                            <div class="col-12 text-center mt-3">
                                <button id="confirmChangePwBtn" class="btn btn-morico px-5 py-2">Xác nhận đổi mật khẩu</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thông tin cá nhân -->
            <div class="section-header">
                <div><i class="fa-solid fa-user-circle"></i> Thông tin cá nhân</div>
                <button id="editBtn" class="btn btn-morico btn-sm px-3 py-1">Sửa</button>
            </div>
            <div class="row g-3" id="personalInfoFields">
                <div class="col-12">
                    <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="fullname" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="phone" disabled maxlength="11">
                </div>
                
                <!-- Địa chỉ tách biệt -->
                <div class="col-md-6">
                    <label class="form-label">Số nhà, tên đường/phố <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="address_detail" disabled>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Xã/phường/đặc khu <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="address_commune" disabled>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tỉnh/thành <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="address_city" disabled>
                </div>
            </div>

            <div class="profile-actions">
                <button id="homeBtn" class="btn-morico-outline px-4">Quay về</button>
                <button id="saveBtn" class="btn btn-morico px-5" style="display:none;">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap Modal for Notifications -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Thông báo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-4" id="modalBody">
                    ...
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-morico px-4" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- BS JS Bundle -->
    <script src="../assets/vendor/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Lấy thông tin người dùng từ localStorage
        let user = JSON.parse(localStorage.getItem("currentUser"));
        const notificationModal = new bootstrap.Modal(document.getElementById('notificationModal'));

        // Function: Load initial data and force disable fields
        function initProfileData() {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            // Hiển thị dữ liệu - hỗ trợ cả key cũ và mới
            document.getElementById("username").value = user.username || "";
            document.getElementById("fullname").value = user.full_name || user.fullname || ""; 
            document.getElementById("email").value = user.email || "";
            document.getElementById("phone").value = user.phone || "";
            
            // Ưu tiên các trường tách biệt mới (commune, city)
            if (user.commune || user.city) {
                document.getElementById("address_detail").value = user.address_detail || user.address || "";
                document.getElementById("address_commune").value = user.commune || user.address_commune || "";
                document.getElementById("address_city").value = user.city || user.address_city || "";
            } else if (user.address && !user.address_detail) {
                // Fallback cho dữ liệu cũ (chỉ có duy nhất 1 chuỗi address)
                document.getElementById("address_detail").value = user.address;
                document.getElementById("address_commune").value = "";
                document.getElementById("address_city").value = "";
            } else {
                document.getElementById("address_detail").value = user.address_detail || "";
                document.getElementById("address_commune").value = user.address_commune || "";
                document.getElementById("address_city").value = user.address_city || "";
            }

            // Đảm bảo tất cả trường trong 'Thông tin cá nhân' đều bị disable
            const personalInputs = document.querySelectorAll("#personalInfoFields input");
            personalInputs.forEach(i => i.setAttribute("disabled", "true"));
        }

        // Call init immediately
        initProfileData();

        // Helper function: Show Modal
        function showModal(title, message, isSuccess = true) {
            const titleEl = document.getElementById('modalTitle');
            const bodyEl = document.getElementById('modalBody');
            
            titleEl.textContent = title;
            titleEl.style.color = isSuccess ? 'var(--secondary-color)' : 'var(--primary-color)';
            bodyEl.textContent = message;
            
            notificationModal.show();
        }

        // Real-time Phone Masking (Only allow numbers)
        const phoneInput = document.getElementById("phone");
        phoneInput.oninput = (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        };

        // Toggle Password Visibility
        function togglePwVisibility(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        const editBtn = document.getElementById("editBtn");
        const saveBtn = document.getElementById("saveBtn");
        const homeBtn = document.getElementById("homeBtn");
        const confirmChangePwBtn = document.getElementById("confirmChangePwBtn");

        // Click Sửa ở nhóm Thông tin cá nhân
        editBtn.addEventListener("click", () => {
            const isEditing = editBtn.textContent.trim() === "Hủy";
            const personalInputs = document.querySelectorAll("#personalInfoFields input");

            if (!isEditing) {
                personalInputs.forEach(i => i.removeAttribute("disabled"));
                editBtn.textContent = "Hủy";
                editBtn.classList.replace("btn-morico", "btn-morico-outline");
                saveBtn.style.display = "inline-block";
                document.getElementById("fullname").focus();
            } else {
                initProfileData();
                editBtn.textContent = "Sửa";
                editBtn.classList.replace("btn-morico-outline", "btn-morico");
                saveBtn.style.display = "none";
            }
        });

        // Xử lý đổi mật khẩu
        confirmChangePwBtn.addEventListener("click", () => {
            const currentPw = document.getElementById("currentPw").value;
            const newPw = document.getElementById("newPw").value;
            const confirmNewPw = document.getElementById("confirmNewPw").value;

            // Kiểm tra trường chưa nhập
            if (!currentPw || !newPw || !confirmNewPw) {
                showModal("Lỗi", "Vui lòng nhập đầy đủ các trường mật khẩu!", false);
                return;
            }

            // Kiểm tra độ dài
            if (newPw.length < 6) {
                showModal("Lỗi", "Mật khẩu mới phải có ít nhất 6 ký tự!", false);
                return;
            }

            // Kiểm tra mật khẩu hiện tại
            if (currentPw !== user.password) {
                showModal("Lỗi", "Mật khẩu hiện tại không chính xác!", false);
                return;
            }

            // Kiểm tra mật khẩu mới trùng khớp
            if (newPw !== confirmNewPw) {
                showModal("Lỗi", "Mật khẩu xác nhận không trùng khớp!", false);
                return;
            }

            // Cập nhật mật khẩu
            const updatedUser = { ...user, password: newPw };
            user = updatedUser; // Cập nhật biến local để đồng bộ UI
            localStorage.setItem("currentUser", JSON.stringify(updatedUser));

            let users = JSON.parse(localStorage.getItem("users")) || [];
            const idx = users.findIndex(u => u.username === user.username);
            if (idx !== -1) {
                users[idx].password = newPw;
                localStorage.setItem("users", JSON.stringify(users));
            }

            showModal("Thành công", "Đổi mật khẩu thành công!");
            
            // Clear inputs
            document.getElementById("currentPw").value = "";
            document.getElementById("newPw").value = "";
            document.getElementById("confirmNewPw").value = "";
            bootstrap.Collapse.getInstance(document.getElementById('changePwSection')).hide();
        });

        // Lưu thông tin cá nhân
        saveBtn.addEventListener("click", () => {
            const fullname = document.getElementById("fullname").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const address_detail = document.getElementById("address_detail").value.trim();
            const address_commune = document.getElementById("address_commune").value.trim();
            const address_city = document.getElementById("address_city").value.trim();

            // Kiểm tra rỗng
            if (!fullname || !email || !phone || !address_detail || !address_commune || !address_city) {
                showModal("Lỗi", "Vui lòng nhập đầy đủ tất cả các trường thông tin cá nhân!", false);
                return;
            }

            // Kiểm tra email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showModal("Lỗi", "Định dạng email không hợp lệ!", false);
                return;
            }

            // Kiểm tra SĐT
            if (phone.length < 10 || phone.length > 11) {
                showModal("Lỗi", "Số điện thoại phải có 10 hoặc 11 chữ số!", false);
                return;
            }

            const updatedUser = {
                ...user,
                full_name: fullname,        // Chuẩn hóa sang key mới
                fullname: fullname,          // Giữ key cũ để tương thích các trang chưa update
                email,
                phone,
                address_detail,             // Lưu input text để hiển thị
                address_commune,
                address_city,
                address: address_detail,    // Map sang cột 'address' trong DB
                commune: address_commune,      // Map sang cột 'commune' trong DB
                city: address_city          // Map sang cột 'city' trong DB
            };

            user = updatedUser; // Cập nhật biến local để đồng bộ UI
            localStorage.setItem("currentUser", JSON.stringify(updatedUser));

            let users = JSON.parse(localStorage.getItem("users")) || [];
            const idx = users.findIndex(u => u.username === user.username);
            if (idx !== -1) {
                users[idx] = { ...users[idx], ...updatedUser };
                localStorage.setItem("users", JSON.stringify(users));
            }

            showModal("Thành công", "Cập nhật thông tin cá nhân thành công!");
            
            // Reset UI state
            initProfileData();
            editBtn.textContent = "Sửa";
            editBtn.classList.replace("btn-morico-outline", "btn-morico");
            saveBtn.style.display = "none";
        });

        homeBtn.addEventListener("click", () => {
            window.location.href = "../index.html";
        });
    </script>
    <script src="../assets/js/user/header.js"></script>
</body>

</html>
