<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm - Morico Bakery</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/user/common.css">
    <link rel="stylesheet" href="../assets/css/user/header.css">
    <link rel="stylesheet" href="../assets/css/user/product-detail.css">

    <link rel="stylesheet" href="../assets/vendor/fontawesome-free-7.2.0/css/all.min.css">
</head>

<body>

    <!-- Bootstrap Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="margin-top:80px; z-index:1055;">
        <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <header>
        <div class="header-container">
            <div class="logo">
                <img src="../assets/image/login/logo.png" alt="Logo Morico" class="logo-img">
                <span>Morico</span>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Bạn muốn tìm bánh gì...">
                <button>
                    <i class="fa-solid fa-magnifying-glass" style="color: white;"></i>
                </button>
            </div>
            <div class="search-results"></div>

            <div class="icon-group">
                <a href="cart.html" class="icon-link" id="cartLink">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartCountBadge" class="cart-count"></span>
                </a>

                <div class="user-menu">
                    <i class="fa-solid fa-user user-icon" id="userIcon"></i>
                    <div class="dropdown" id="userDropdown">
                        <!-- Nội dung sẽ được cập nhật bằng JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="nav-bar">
        <a href="../index.html">TRANG CHỦ</a>
        <a href="about.html">GIỚI THIỆU</a>
        <a href="./product.html">SẢN PHẨM</a>
    </nav>

    <div class="product-detail-container">
        <div id="product-content">
            <div class="loading">Đang tải thông tin sản phẩm...</div>
        </div>
    </div>

    <footer>
        © 2025 Morico Bakery | Hotline: 0909 123 456 | Email: contact@morico.vn
    </footer>

    <!-- Bootstrap JS bundle (required for Toast) -->
    <script src="../assets/vendor/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

    <!-- Load sample/products helper BEFORE the inline page script so `morico_products` is available -->
    <script src="../assets/js/user/product.js"></script>

    <script src="../assets/js/user/header.js"></script>
    <script src="../assets/js/user/product-detail.js"></script>
</body>

</html>
