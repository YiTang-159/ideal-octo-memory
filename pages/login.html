<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Morico Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/user/common.css">
    <link rel="stylesheet" href="../assets/css/user/auth.css">
</head>

<body class="auth-standalone">

    <div class="login-card d-flex flex-column flex-md-row mx-auto">
        <!-- Image Side -->
        <div class="image-section d-flex align-items-center justify-content-center p-4" style="flex: 1;">
            <img src="../assets/image/login/logo.png" alt="Login Illustration" />
        </div>

        <!-- Login Form Side -->
        <div class="login-section d-flex flex-column justify-content-center p-4 p-md-5" style="flex: 1;">
            <h1 class="page-title">Đăng nhập</h1>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold" style="color: var(--primary-color);">Tên đăng
                        nhập</label>
                    <input type="text" class="form-control" id="username" placeholder="Tên đăng nhập">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-bold" style="color: var(--primary-color);">Mật
                        khẩu</label>
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu">
                </div>

                <div class="form-check mb-2">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label fw-normal" for="rememberMe" style="color: var(--primary-color);">Ghi
                        nhớ đăng nhập</label>
                </div>

                <div id="errorMsg" class="error text-center my-2"></div>
                <button type="submit" class="btn btn-morico w-100 py-2">Đăng nhập</button>
            </form>

            <div class="link text-center mt-4" style="font-size: 1rem; color: var(--primary-color);">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <!-- Locked Account Modal (custom, no BS JS needed) -->
    <div id="lockedAccountModal" class="custom-modal">
        <div class="bg-white rounded-3 p-4 p-md-5 text-center shadow-lg" style="max-width: 400px; width: 90%;">
            <div class="mb-3" style="font-size: 3rem;">🚫</div>
            <h5 class="fw-bold mb-3" style="color: var(--primary-color);">Tài khoản đã bị khóa</h5>
            <p class="mb-4" style="color: #5D4037; line-height: 1.5;">
                Tài khoản của bạn đã bị vô hiệu hóa. Nếu bạn có bất kỳ thắc mắc hay quan tâm nào,
                bạn có thể liên hệ 0909 123 456 để được hỗ trợ.
            </p>
            <button class="btn btn-morico px-4 py-2" id="modalOkBtn">OK</button>
        </div>
    </div>

    <script>
        // Khởi tạo dữ liệu mẫu (fallback in-memory) - KHÔNG lưu vào localStorage
        // Điều này cho phép tài khoản mẫu (khachhang1 / 123456) đăng nhập được ở mọi máy
        // mà không cần ghi thông tin user vào localStorage trên thiết bị đó.
        function initializeSampleData() {
            window.SAMPLE_USERS = [
                {
                    id: 1,
                    username: "khachhang1",
                    password: "123456",
                    fullName: "Khách hàng",
                    email: "khachhang1@email.com",
                    phone: "0909123456",
                    status: "active",
                    role: "customer",
                    createdAt: new Date().toISOString()
                }
            ];
        }

        // Gọi hàm khởi tạo dữ liệu mẫu (in-memory fallback)
        initializeSampleData();

        const form = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");
        const lockedAccountModal = document.getElementById("lockedAccountModal");
        const modalOkBtn = document.getElementById("modalOkBtn");

        // Xử lý đăng nhập
        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const usernameInput = document.getElementById("username").value.trim();
            const passwordInput = document.getElementById("password").value.trim();

            // Lấy danh sách users từ Local Storage (nếu có)
            const users = JSON.parse(localStorage.getItem("users")) || [];
            // Kết hợp với các user mẫu in-memory (không được lưu xuống localStorage)
            const allUsers = users.concat(window.SAMPLE_USERS || []);

            if (!usernameInput || !passwordInput) {
                errorMsg.textContent = "Vui lòng nhập đầy đủ thông tin.";
                return;
            }

            // Tìm user trong danh sách kết hợp (localStorage users + mẫu in-memory)
            const user = allUsers.find(u => u.username === usernameInput && u.password === passwordInput);

            if (user) {
                // Kiểm tra tài khoản có bị khóa không
                if (user.status === "locked") {
                    // Hiển thị modal thông báo tài khoản bị khóa
                    lockedAccountModal.style.display = "flex";
                    return;
                }

                errorMsg.textContent = "";

                // Lưu thông tin user đang đăng nhập
                localStorage.setItem("currentUser", JSON.stringify(user));

                // Hiển thị thông báo đăng nhập thành công
                alert(`Đăng nhập thành công! Chào mừng bạn đến với Morico Bakery.`);

                // Chuyển hướng đến trang chính
                window.location.href = "../index.html";
            } else {
                errorMsg.textContent = "Tên đăng nhập hoặc mật khẩu không đúng.";
            }
        });

        // Xử lý nút OK trong modal
        modalOkBtn.addEventListener("click", () => {
            lockedAccountModal.style.display = "none";
        });

        // Đóng modal khi click bên ngoài
        window.addEventListener("click", (e) => {
            if (e.target === lockedAccountModal) {
                lockedAccountModal.style.display = "none";
            }
        });

        // Kiểm tra nếu đã có user đăng nhập thì chuyển hướng luôn
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem("currentUser");
            if (currentUser) {
                // Nếu muốn tự động đăng nhập lại, có thể chuyển hướng ở đây
                // window.location.href = "../index.html";
            }
        });
    </script>

</body>

</html>
