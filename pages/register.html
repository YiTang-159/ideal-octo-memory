<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../assets/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/user/common.css">
    <link rel="stylesheet" href="../assets/vendor/fontawesome-free-7.2.0/css/all.min.css">

    <style>
        body {
            height: 100vh;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to right, #FFF4C2, #FFF4C2);
        }

        .register-card {
            width: 400px;
            max-width: 95%;
            background-color: #fff8c9;
            border: 2px solid var(--primary-color);
            border-radius: 1.25rem;
            box-shadow: var(--shadow);
            color: var(--primary-color);
        }

        .register-card .form-control {
            border: 1.5px solid var(--primary-color);
            background-color: #FFFCEE;
            color: var(--primary-color);
            font-family: "Century", serif;
        }

        .register-card .form-control:focus {
            border-color: var(--primary-hover);
            background-color: #FFF8B5;
            box-shadow: 0 0 0 0.2rem rgba(139, 0, 0, 0.15);
        }

        /* Ẩn icon con mắt mặc định của Chrome */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        input[type="password"]::-webkit-credentials-auto-fill-button,
        input[type="password"]::-webkit-password-toggle-button {
            display: none;
            visibility: hidden;
        }

        .password-wrapper {
            position: relative;
        }

        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.7;
            color: var(--primary-color);
            display: none;
        }

        .eye-icon:hover {
            opacity: 1;
        }

        .btn-morico {
            background-color: var(--primary-color);
            color: #FFFBD1;
            border: none;
            border-radius: 25px;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .btn-morico:hover {
            background-color: var(--primary-hover);
            color: #FFFBD1;
            transform: scale(1.03);
        }

        .error {
            color: var(--primary-hover);
            font-weight: bold;
            height: 20px;
        }

        .login-link a {
            color: var(--primary-hover);
            font-weight: bold;
            text-decoration: none;
            transition: var(--transition);
        }

        .login-link a:hover {
            text-decoration: underline;
            color: #FF4500;
        }
    </style>
</head>

<body>
    <div class="register-card mx-auto p-4 p-md-5">
        <h2 class="text-center fw-bold mb-4" style="font-size: 2rem;">Đăng ký</h2>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="fullname" placeholder="Nhập họ và tên" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Tên đăng nhập <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Số điện thoại <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="phone" placeholder="Nhập số điện thoại" required>
                <div id="phoneError" class="error text-center small mt-1"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                    <i class="fa-solid fa-eye eye-icon" id="togglePassword"></i>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu"
                        required>
                    <i class="fa-solid fa-eye eye-icon" id="toggleConfirmPassword"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-morico w-100 py-2 mt-2">Đăng ký</button>
            <div id="errorMsg" class="error text-center mt-2"></div>

            <!-- Dòng link đăng nhập -->
            <p class="login-link text-center mt-3 mb-0" style="font-size: 0.9rem; color: var(--primary-color);">
                Bạn đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
            </p>
        </form>
    </div>

    <script>
        const form = document.getElementById("registerForm");
        const errorMsg = document.getElementById("errorMsg");
        const phoneError = document.getElementById("phoneError");
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const phoneInput = document.getElementById('phone');

        // Ẩn/hiện mật khẩu khi click vào con mắt thứ 1 (mật khẩu)
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        // Ẩn/hiện mật khẩu khi click vào con mắt thứ 2 (xác nhận mật khẩu)
        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
        });

        // Hiện con mắt khi có dữ liệu (mật khẩu)
        passwordInput.addEventListener('input', () => {
            if (passwordInput.value.trim() !== '') {
                togglePassword.style.display = 'block';
            } else {
                togglePassword.style.display = 'none';
            }
        });

        // Hiện con mắt khi có dữ liệu (xác nhận mật khẩu)
        confirmPasswordInput.addEventListener('input', () => {
            if (confirmPasswordInput.value.trim() !== '') {
                toggleConfirmPassword.style.display = 'block';
            } else {
                toggleConfirmPassword.style.display = 'none';
            }
        });

        // Khi click vào lại ô (nếu có chữ thì vẫn hiện icon) - mật khẩu
        passwordInput.addEventListener('focus', () => {
            if (passwordInput.value.trim() !== '') {
                togglePassword.style.display = 'block';
            }
        });

        // Khi click vào lại ô (nếu có chữ thì vẫn hiện icon) - xác nhận mật khẩu
        confirmPasswordInput.addEventListener('focus', () => {
            if (confirmPasswordInput.value.trim() !== '') {
                toggleConfirmPassword.style.display = 'block';
            }
        });

        // Khi rời ô (nếu trống thì ẩn icon) - mật khẩu
        passwordInput.addEventListener('blur', () => {
            if (passwordInput.value.trim() === '') {
                togglePassword.style.display = 'none';
            }
        });

        // Khi rời ô (nếu trống thì ẩn icon) - xác nhận mật khẩu
        confirmPasswordInput.addEventListener('blur', () => {
            if (confirmPasswordInput.value.trim() === '') {
                toggleConfirmPassword.style.display = 'none';
            }
        });

        // Kiểm tra số điện thoại khi nhập
        phoneInput.addEventListener('input', () => {
            validatePhone();
        });

        // Kiểm tra số điện thoại khi rời khỏi ô nhập
        phoneInput.addEventListener('blur', () => {
            validatePhone();
        });

        // Hàm kiểm tra số điện thoại
        function validatePhone() {
            const phoneValue = phoneInput.value.trim();
            const phoneRegex = /^[0-9]{10,11}$/;

            if (phoneValue === '') {
                phoneError.textContent = '';
                return false;
            } else if (!phoneRegex.test(phoneValue)) {
                phoneError.textContent = 'Số điện thoại phải có 10-11 chữ số';
                return false;
            } else {
                phoneError.textContent = '';
                return true;
            }
        }

        // Xử lý đăng ký
        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const user = {
                id: Date.now(), // Tạo ID tự động
                fullname: document.getElementById('fullname').value.trim(),
                username: document.getElementById('username').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value.trim(),
                // SỬA: Thêm các trường cần thiết cho profile
                email: "",
                address: "",
                regDate: new Date().toISOString().split('T')[0], // Ngày đăng ký
                status: "active" // Trạng thái mặc định
            };
            const confirm = document.getElementById('confirmPassword').value.trim();

            if (!user.fullname || !user.username || !user.phone || !user.password || !confirm) {
                errorMsg.textContent = "Vui lòng nhập đầy đủ thông tin.";
            } else if (!validatePhone()) {
                errorMsg.textContent = "Vui lòng kiểm tra lại số điện thoại.";
            } else if (user.password.length < 6) {
                errorMsg.textContent = "Mật khẩu phải có ít nhất 6 ký tự.";
            } else if (user.password !== confirm) {
                errorMsg.textContent = "Mật khẩu xác nhận không khớp.";
            } else {
                // Lấy danh sách user từ Local Storage
                let users = JSON.parse(localStorage.getItem("users")) || [];

                // Kiểm tra username đã tồn tại chưa
                const existingUser = users.find(u => u.username === user.username);
                if (existingUser) {
                    errorMsg.textContent = "Tên đăng nhập đã tồn tại.";
                    return;
                }

                // Kiểm tra số điện thoại đã tồn tại chưa
                const existingPhone = users.find(u => u.phone === user.phone);
                if (existingPhone) {
                    errorMsg.textContent = "Số điện thoại đã được đăng ký.";
                    return;
                }

                // Thêm user mới vào mảng
                users.push(user);

                // Lưu lại vào Local Storage
                localStorage.setItem("users", JSON.stringify(users));

                alert("Đăng ký thành công!");
                window.location.href = "login.html";
            }
        });
    </script>
</body>

</html>
