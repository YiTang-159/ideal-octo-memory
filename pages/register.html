<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>

    <link rel="stylesheet" href="../assets/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/user/common.css">
    <link rel="stylesheet" href="../assets/css/user/auth.css">
    <link rel="stylesheet" href="../assets/vendor/fontawesome-free-7.2.0/css/all.min.css">
</head>

<body class="auth-standalone">
    <div class="login-card d-flex flex-column flex-md-row mx-auto">
        <!-- Image Side -->
        <div class="image-section d-flex align-items-center justify-content-center p-4" style="flex: 1;">
            <a href="../index.html"><img src="../assets/image/common/morico-black-emblem.png" alt="MORICO" class="logo-img"></a>
        </div>

        <!-- Login Form Side -->
        <div class="login-section d-flex flex-column justify-content-center p-4 p-md-5" style="flex: 1;">
            <h1 class="page-title">Đăng ký</h1>

            <form id="registerForm">
                <div class="mb-3">
                    <label for="fullname" class="form-label fw-bold">Họ và tên <span
                            class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="fullname" placeholder="Nhập họ và tên" required>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label fw-bold">Tên đăng nhập <span
                            class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label fw-bold">Số điện thoại <span
                            class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="phone" placeholder="Nhập số điện thoại" required>
                    <div id="phoneError" class="error text-center small mt-1"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" placeholder="Nhập địa chỉ email" required>
                    <div id="emailError" class="error text-center small mt-1"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Địa chỉ giao hàng <span class="text-danger">*</span></label>
                    <input type="text" class="form-control mb-2" id="reg-address" placeholder="Số nhà, tên đường/phố" required>
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="text" class="form-control" id="reg-commune" placeholder="Phường/xã/đặc khu" required>
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control" id="reg-city" placeholder="Tỉnh/thành" required>
                        </div>
                    </div>
                    <div id="addressError" class="error text-center small mt-1"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                        <i class="fa-solid fa-eye eye-icon" id="togglePassword"></i>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label fw-bold">Xác nhận mật khẩu <span
                            class="text-danger">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu"
                            required>
                        <i class="fa-solid fa-eye eye-icon" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-morico w-100 py-2 mt-2">Đăng ký</button>
                <div id="errorMsg" class="error text-center mt-2"></div>

                <!-- Dòng link đăng nhập -->
                <p class="login-link text-center mt-3 mb-0" style="font-size: 0.9rem; color: var(--primary-color);">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../assets/js/user/register.js"></script>
</body>

</html>
